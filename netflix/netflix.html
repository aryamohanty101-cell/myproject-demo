 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone</title>
    <link rel="stylesheet" href="netflix.css">
</head>
<body>

    <div class="main">

        <!-- Navbar -->
        <nav>
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/75/Netflix_icon.svg" alt="Netflix Logo" class="logo">

            <div>
                <button class="lang-btn">English</button>
                <button class="signin-btn">Sign In</button>
            </div>
        </nav>

        <!-- Hero Section -->
        <div class="hero">
            <h1>Unlimited movies, TV shows and more</h1>
            <h3>Watch anywhere. Cancel anytime.</h3>
            <p>Ready to watch? Enter your email to create or restart your membership.</p>

            <div class="email-box">
                <input type="email" placeholder="Email address">
                <button>Get Started ></button>
            </div>
        </div>

    </div>

    <!-- Features -->
    <section class="feature">
        <div class="text">
            <h2>Enjoy on your TV</h2>
            <p>Watch on Smart TVs, Playstation, Xbox and more.</p>
        </div>

        <img src="https://assets.nflxext.com/ffe/siteui/acquisition/ourStory/fuji/desktop/tv.png" alt="">
    </section>

    <section class="feature">
        <img src="https://occ-0-2484-3646.1.nflxso.net/art/5d2bb/6f8f4f79f1f0cb8e36a1c34f94f7d24d6b5d2bb.jpg" alt="">

        <div class="text">
            <h2>Download your shows</h2>
            <p>Save your favorites and watch offline.</p>
        </div>
    </section>

</body>
</html>
